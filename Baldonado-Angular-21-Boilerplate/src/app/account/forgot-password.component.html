<form [formGroup]="form" (ngSubmit)="onSubmit()">
  <h4 class="mb-4">Forgot Password</h4>

  <div class="mb-3">
    <label class="form-label">Email</label>
    <input type="text" formControlName="email" class="form-control" [ngClass]="{ 'is-invalid': submitted && f.email.errors }" />
    <div *ngIf="submitted && f.email.errors" class="invalid-feedback">
      <div *ngIf="f.email.errors['required']">Email is required</div>
      <div *ngIf="f.email.errors['email']">Email must be a valid email address</div>
    </div>
  </div>

  <button [disabled]="loading" class="btn btn-primary w-100">
    <span *ngIf="loading" class="spinner-border spinner-border-sm mr-2"></span>
    Submit
  </button>

  <div class="text-center mt-4">
    <a routerLink="../login" class="text-decoration-none">Back to Login</a>
  </div>
</form>
